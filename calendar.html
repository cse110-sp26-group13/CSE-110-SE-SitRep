<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SitRep — Calendar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..100,400;12..96,75..100,700;12..96,75..100,800&family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/rail.css" />
  <link rel="stylesheet" href="css/page.css" />
  <link rel="stylesheet" href="css/calendar.css?v=3" />

  <script src="js/theme.js"></script>
</head>
<body data-page="calendar">
  <div class="app">
    <aside class="rail" aria-label="Primary navigation">
      <a class="rail-icon" data-route="dashboard" href="index.html" title="Dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="square"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </a>
      <a class="rail-icon" data-route="standup" href="standup.html" title="Standup">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="square"><circle cx="9" cy="8" r="3"/><path d="M3 21v-1a6 6 0 0 1 12 0v1"/><circle cx="17" cy="9" r="2.5"/><path d="M14 21v-1a5 5 0 0 1 7-4.6"/></svg>
      </a>
      <a class="rail-icon" data-route="issues" href="issues.html" title="Issues">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="square"><path d="M12 3 2 20h20L12 3z"/><line x1="12" y1="10" x2="12" y2="14"/><rect x="11.5" y="16.4" width="1" height="1"/></svg>
      </a>
      <a class="rail-icon" data-route="calendar" href="calendar.html" title="Calendar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="square"><rect x="3" y="5" width="18" height="16"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/></svg>
      </a>
      <div class="rail-spacer"></div>
      <a class="rail-icon" data-route="settings" href="#" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="square"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>
      </a>
      <button class="rail-icon theme-toggle" id="theme-toggle" type="button" title="Toggle theme" aria-pressed="false">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="square"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.5 6.5 0 0 0 9.8 9.8Z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="square"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>
      </button>
    </aside>

    <main class="main">
      <header class="page-intro">
        <div>
          <div class="eyebrow">
            <span class="live-dot"></span>
            <span id="header-sub">loading…</span>
          </div>
          <h1>Calendar.</h1>
          <p class="lede">Project timelines, issue due dates, and personal milestones in one view. Toggle <em>personal</em> vs <em>team</em>; click an issue bar to jump into the tracker.</p>
        </div>
        <div class="page-actions">
          <a class="btn-secondary" href="index.html">← Dashboard</a>
          <button class="btn-secondary" id="new-project-btn">+ New project</button>
          <button class="btn-primary" id="new-event-btn">+ New event</button>
        </div>
      </header>

      <div class="deep-content">
        <div class="cal-layout">
          <aside class="cal-side">
            <div>
              <h4>View</h4>
              <div class="cal-toggle" role="tablist">
                <button class="on" data-view="all">All</button>
                <button data-view="personal">Personal</button>
                <button data-view="team">Team</button>
              </div>
              <div class="cal-toggle-sep"></div>
              <div class="cal-toggle" role="tablist">
                <button data-view="issues">Issues Tracker</button>
              </div>
            </div>

            <div id="cal-projects-section">
              <h4>Projects</h4>
              <div class="cal-projects" id="cal-projects"></div>
            </div>

            <div id="cal-legend-section">
              <h4 id="cal-legend-title">Legend</h4>
              <div class="cal-legend" id="cal-legend"></div>
            </div>
          </aside>

          <section class="cal-main">
            <div class="cal-hd">
              <div class="cal-month" id="cal-month">May<span class="yr">2026</span></div>
              <div class="cal-nav">
                <button id="cal-prev" aria-label="Previous month">‹</button>
                <button class="today-btn" id="cal-today">Today</button>
                <button id="cal-next" aria-label="Next month">›</button>
              </div>
            </div>
            <div class="cal-grid" id="cal-grid"></div>
            <div class="cal-foot">
              <span id="cal-foot-count">—</span>
              <span>Drag-to-create &amp; recurring events land in v2</span>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-backdrop" id="calendar-event-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="calendar-event-modal-title">
      <div class="modal-head">
        <h3 id="calendar-event-modal-title">New event</h3>
        <button class="modal-close" id="calendar-event-modal-close" type="button" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <form id="calendar-event-form" class="issue-form cal-event-form">
          <label class="field">
            <span>Name</span>
            <input type="text" id="calendar-event-name" required maxlength="80" placeholder="Event name" />
          </label>
          <label class="field">
            <span>Date</span>
            <input type="date" id="calendar-event-date" required />
          </label>
          <label class="field">
            <span>Project</span>
            <select id="calendar-event-project" required></select>
          </label>
          <label class="field">
            <span>Criteria</span>
            <select id="calendar-event-kind" required>
              <option value="team">Team milestone</option>
              <option value="personal">Personal due</option>
              <option value="risk">Risk</option>
              <option value="blocked">Blocked</option>
            </select>
          </label>
          <p id="calendar-event-error" class="field-error" hidden></p>
          <div class="form-actions">
            <button type="button" class="btn-danger" id="calendar-event-delete" hidden>Delete event</button>
            <button type="button" class="btn-secondary" id="calendar-event-cancel">Cancel</button>
            <button type="submit" class="btn-primary" id="calendar-event-submit">Create event</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="calendar-project-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="calendar-project-modal-title">
      <div class="modal-head">
        <h3 id="calendar-project-modal-title">New project</h3>
        <button class="modal-close" id="calendar-project-modal-close" type="button" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <form id="calendar-project-form" class="issue-form cal-project-form">
          <label class="field">
            <span>Name</span>
            <input type="text" id="calendar-project-name" required maxlength="60" placeholder="Project name" />
          </label>
          <label class="field cal-color-field">
            <span>Color</span>
            <input type="color" id="calendar-project-color" value="#4f8cff" />
          </label>
          
          <div id="calendar-project-events-section" hidden>
            <h4 class="modal-subhead">Events</h4>
            <div id="calendar-project-events-list" class="cal-project-events-list"></div>
          </div>

          <p id="calendar-project-error" class="field-error" hidden></p>
          <div class="form-actions">
            <button type="button" class="btn-danger" id="calendar-project-delete" hidden>Delete project</button>
            <button type="button" class="btn-secondary" id="calendar-project-cancel">Cancel</button>
            <button type="submit" class="btn-primary" id="calendar-project-submit">Create project</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Auth + Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth-guard.js"></script>

  <!-- Shared infra -->
  <script src="data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/selectors.js"></script>
  <script src="js/nav.js"></script>

  <!-- Features used on this page -->
  <script src="js/features/header.js"></script>

  <!-- Page orchestrator -->
  <script src="js/pages/calendar.js?v=4"></script>
</body>
</html>
