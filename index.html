<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SE SitRep — Dashboard</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/rail.css" />
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/kpis.css" />
  <link rel="stylesheet" href="css/checkins.css" />
  <link rel="stylesheet" href="css/blockers.css" />
  <link rel="stylesheet" href="css/slots.css" />
  <link rel="stylesheet" href="css/mood-trend.css" />
  <link rel="stylesheet" href="css/activity.css" />
</head>
<body>
  <div class="app">
    <aside class="rail" aria-label="Primary navigation">
      <div class="rail-icon active" title="Dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </div>
      <div class="rail-icon" title="Team">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3"/><path d="M3 21v-1a6 6 0 0 1 12 0v1"/><circle cx="17" cy="9" r="2.5"/><path d="M14 21v-1a5 5 0 0 1 7-4.6"/></svg>
      </div>
      <div class="rail-icon" title="Blockers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3 2 20h20L12 3z"/><line x1="12" y1="10" x2="12" y2="14"/><circle cx="12" cy="17" r="0.6" fill="currentColor"/></svg>
      </div>
      <div class="rail-icon" title="Calendar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/></svg>
      </div>
      <div class="rail-spacer"></div>
      <div class="rail-icon" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
      </div>
    </aside>

    <main class="main">
      <header class="header">
        <div>
          <h1>Dashboard</h1>
          <div class="header-sub" id="header-sub"></div>
        </div>
        <div class="header-actions">
          <button class="btn-secondary" id="reset-btn" title="Clear local changes">Reset demo</button>
          <button class="btn-primary" id="post-checkin-btn">+ Post standup</button>
        </div>
      </header>

      <section class="kpis" id="kpis" aria-label="At-a-glance KPIs"></section>

      <div class="content">
        <div class="row-main">
          <div class="standup-column">
            <section class="card mood-quick-card" aria-labelledby="mood-quick-title">
              <div class="card-head">
                <h2 id="mood-quick-title">How are you today?</h2>
                <span class="card-sub" id="mood-quick-sub"></span>
              </div>
              <div class="mood-faces" id="mood-faces" role="radiogroup" aria-label="Mood">
                <button type="button" class="mood-face" data-mood="2" aria-label="Very sad">😢</button>
                <button type="button" class="mood-face" data-mood="4" aria-label="Sad">🙁</button>
                <button type="button" class="mood-face" data-mood="6" aria-label="Okay">😐</button>
                <button type="button" class="mood-face" data-mood="8" aria-label="Happy">🙂</button>
                <button type="button" class="mood-face" data-mood="10" aria-label="Very happy">😄</button>
              </div>
            </section>

            <section class="card standup-card" aria-labelledby="checkins-title">
            <div class="card-head">
              <h2 id="checkins-title">Daily standup</h2>
              <span class="card-sub" id="checkins-sub"></span>
            </div>
            <form class="checkin-form" id="checkin-form" hidden>
              <label>What did you do yesterday?
                <input type="text" id="yesterday-input" placeholder="Shipped the auth migration..." />
              </label>
              <label>What are you doing today?
                <input type="text" id="today-input" placeholder="Pairing with Sam on the empty states..." />
              </label>
              <label>Any blockers?
                <input type="text" id="blockers-input" placeholder="Leave blank if none" />
              </label>
              <div class="form-actions">
                <button type="button" class="btn-secondary" id="cancel-checkin">Cancel</button>
                <button type="submit" class="btn-primary">Post standup</button>
              </div>
            </form>
            <ul class="checkin-list" id="checkin-list"></ul>
            </section>
          </div>

          <section class="card" aria-labelledby="blockers-title">
            <div class="card-head blockers-head">
              <h2 id="blockers-title">Issues</h2>
              <div class="filters-wrap">
                <div class="filters" id="status-filters" role="tablist" aria-label="Filter by status">
                  <button data-status="open" class="chip active">Open</button>
                  <button data-status="resolved" class="chip">Resolved</button>
                  <button data-status="all" class="chip">All</button>
                </div>
                <div class="filters" id="severity-filters" role="tablist" aria-label="Filter by severity">
                  <button data-sev="all" class="chip active">All</button>
                  <button data-sev="critical" class="chip">Critical</button>
                  <button data-sev="high" class="chip">High</button>
                  <button data-sev="medium" class="chip">Medium</button>
                </div>
              </div>
              <button class="btn-primary new-issue-btn" id="add-blocker-btn">+ New issue</button>
            </div>
            <ul class="blocker-list" id="blocker-list"></ul>
          </section>

          <aside class="right-rail">
            <section class="card meeting-card" aria-labelledby="meet-title">
              <div class="card-head">
                <h2 id="meet-title">When can we meet?</h2>
                <span class="card-sub">Click cells to toggle</span>
              </div>
              <ul class="slots-list" id="slots-list"></ul>
            </section>
          </aside>
        </div>

        <div class="row-bottom">
          <section class="card" aria-labelledby="mood-title">
            <div class="card-head">
              <h2 id="mood-title">Team mood — last 7 days</h2>
              <span class="card-sub" id="mood-card-sub"></span>
            </div>
            <div class="sparkline-wrap" id="sparkline-wrap"></div>
          </section>

          <section class="card" aria-labelledby="activity-title">
            <div class="card-head">
              <h2 id="activity-title">Recent activity</h2>
              <span class="card-sub" id="activity-sub"></span>
            </div>
            <ul class="activity-list" id="activity-list"></ul>
          </section>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-backdrop" id="issue-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="issue-modal-title">
      <div class="modal-head">
        <h3 id="issue-modal-title">New issue</h3>
        <button class="modal-close" id="issue-modal-close" aria-label="Close">×</button>
      </div>
      <div class="modal-body" id="issue-modal-body"></div>
    </div>
  </div>

  <script src="https://esm.sh/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/selectors.js"></script>
  <script src="js/features/header.js"></script>
  <script src="js/features/kpis.js"></script>
  <script src="js/features/checkins.js"></script>
  <script src="js/features/blockers.js"></script>
  <script src="js/features/slots.js"></script>
  <script src="js/features/mood-trend.js"></script>
  <script src="js/features/activity.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
