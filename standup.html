<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SitRep — Standup</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/rail.css" />
  <link rel="stylesheet" href="css/topbar.css" />
  <link rel="stylesheet" href="css/page.css" />
  <link rel="stylesheet" href="css/lists.css" />
  <link rel="stylesheet" href="css/checkins.css" />
  <link rel="stylesheet" href="css/slots.css" />
  <link rel="stylesheet" href="css/mood-trend.css" />
  <link rel="stylesheet" href="css/palette.css" />
  <link rel="stylesheet" href="css/github-embeds.css" />
</head>
<body data-page="standup">
  <div class="app">
    <aside class="rail" aria-label="Primary navigation">
      <button class="workspace" id="workspace-switcher" type="button">
        <span class="ws-logo">G13</span>
        <span class="ws-name">Group 13</span>
        <span class="ws-chev">⌄</span>
      </button>

      <button class="cmd-trigger" id="cmd-trigger" type="button" aria-label="Open command palette">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.5" y2="16.5"/></svg>
        <span class="label">Search or jump…</span>
        <kbd>⌘K</kbd>
      </button>

      <div class="nav-section">
        <div class="nav-label">Workspace</div>
        <a class="nav-item" data-route="dashboard" href="index.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          <span>Overview</span>
        </a>
        <a class="nav-item" data-route="standup" href="standup.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="9" cy="8" r="3"/><path d="M3 21v-1a6 6 0 0 1 12 0v1"/><circle cx="17" cy="9" r="2.5"/><path d="M14 21v-1a5 5 0 0 1 7-4.6"/></svg>
          <span>Standup</span><span class="count" id="nav-count-standup">—</span>
        </a>
        <a class="nav-item" data-route="issues" href="issues.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 3 2 20h20L12 3z"/><line x1="12" y1="10" x2="12" y2="14"/></svg>
          <span>Issues</span><span class="count" id="nav-count-issues">—</span>
        </a>
        <a class="nav-item" data-route="calendar" href="calendar.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="5" width="18" height="16"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/></svg>
          <span>Calendar</span>
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-label">From GitHub</div>
        <a class="nav-item" data-gh="prs" href="https://github.com/cse110-sp26-group13/CSE-110-SE-SitRep/pulls" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="6" cy="6" r="2.5"/><circle cx="6" cy="18" r="2.5"/><line x1="6" y1="8.5" x2="6" y2="15.5"/><path d="M18 13V8.5a2 2 0 0 0-2-2H9"/><circle cx="18" cy="15" r="2.5"/></svg>
          <span>Open PRs</span><span class="count" id="nav-count-prs" hidden>—</span>
        </a>
        <a class="nav-item" data-gh="reviews" href="https://github.com/pulls/review-requested" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><polyline points="9 12 11 14 15 10"/></svg>
          <span>Reviews due</span><span class="count" id="nav-count-reviews" hidden>—</span>
        </a>
        <a class="nav-item" data-gh="ci" href="https://github.com/cse110-sp26-group13/CSE-110-SE-SitRep/actions" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><polyline points="8 12 11 15 16 9"/></svg>
          <span>CI status</span><span class="count" id="nav-count-ci" hidden>—</span>
        </a>
      </div>

      <div class="rail-spacer"></div>

      <div class="rail-foot">
        <div class="avatar" id="rail-user-avatar">—</div>
        <div class="rail-foot-name" id="rail-user-name">—</div>
        <button class="rail-foot-out" id="rail-signout" title="Sign out">↗</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="crumb">
          <span>Group 13</span>
          <span class="sep">/</span>
          <span class="current">Standup</span>
        </div>
        <div class="topbar-actions">
          <a class="btn-secondary" href="index.html">← Overview</a>
          <button class="btn-primary" id="post-checkin-btn">+ Post standup</button>
        </div>
      </header>

      <div class="tabs">
        <button class="tab active">Today</button>
        <button class="tab">Week</button>
      </div>

      <div class="main-scroll">
        <div class="page">
          <div class="page-head">
            <h1 class="page-title">Daily standup</h1>
            <div class="page-sub" id="header-sub">loading…</div>
          </div>

          <div class="standup-layout">
            <div class="standup-column" style="display:flex;flex-direction:column;gap:14px;">
              <section class="section mood-quick-card" aria-labelledby="mood-quick-title">
                <div class="section-head">
                  <div class="section-title" id="mood-quick-title">How are you today?</div>
                  <div class="section-sub" id="mood-quick-sub"></div>
                </div>
                <div class="mood-faces" id="mood-faces" role="radiogroup" aria-label="Mood">
                  <button type="button" class="mood-face" data-mood="2"  aria-label="Very sad">😢</button>
                  <button type="button" class="mood-face" data-mood="4"  aria-label="Sad">🙁</button>
                  <button type="button" class="mood-face" data-mood="6"  aria-label="Okay">😐</button>
                  <button type="button" class="mood-face" data-mood="8"  aria-label="Happy">🙂</button>
                  <button type="button" class="mood-face" data-mood="10" aria-label="Very happy">😄</button>
                </div>
              </section>

              <section class="section standup-card" aria-labelledby="checkins-title">
                <div class="section-head">
                  <div class="section-title" id="checkins-title">Everyone today</div>
                  <div class="section-sub" id="checkins-sub"></div>
                </div>
                <form class="checkin-form" id="checkin-form" hidden>
                  <label class="field">
                    <span>What did you do yesterday?</span>
                    <input type="text" id="yesterday-input" placeholder="Shipped the auth migration…" />
                  </label>
                  <label class="field">
                    <span>What are you doing today?</span>
                    <input type="text" id="today-input" placeholder="Pairing with Sam on the empty states…" />
                  </label>
                  <label class="field">
                    <span>Any blockers?</span>
                    <input type="text" id="blockers-input" placeholder="Leave blank if none" />
                  </label>
                  <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancel-checkin">Cancel</button>
                    <button type="submit" class="btn-primary">Post standup</button>
                  </div>
                </form>
                <ul class="checkin-list" id="checkin-list"></ul>
              </section>
            </div>

            <aside class="standup-side">
              <section class="section" aria-labelledby="meet-title">
                <div class="section-head">
                  <div class="section-title" id="meet-title">When can we meet?</div>
                  <div class="section-sub">click to toggle</div>
                </div>
                <ul class="slots-list" id="slots-list"></ul>
              </section>

              <section class="section" aria-labelledby="mood-title">
                <div class="section-head">
                  <div class="section-title" id="mood-title">Mood — last 7 days</div>
                  <div class="section-sub" id="mood-card-sub"></div>
                </div>
                <div class="sparkline-wrap" id="sparkline-wrap"></div>
              </section>
            </aside>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Auth + Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth-guard.js"></script>

  <!-- Shared infra -->
  <script src="data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/selectors.js"></script>
  <script src="js/nav.js"></script>

  <!-- Features used on this page -->
  <script src="js/features/github-embeds.js"></script>
  <script src="js/features/palette.js"></script>
  <script src="js/features/header.js"></script>
  <script src="js/features/checkins.js"></script>
  <script src="js/features/slots.js"></script>
  <script src="js/features/mood-trend.js"></script>
  <script src="js/features/activity.js"></script>

  <!-- Page orchestrator -->
  <script src="js/pages/standup.js"></script>
</body>
</html>
